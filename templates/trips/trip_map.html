{% extends 'base.html' %}

{% block title %}Trip Map - Transport Management System{% endblock %}

{% block content %}
<header class="flex flex-col md:flex-row md:items-center justify-between mb-6">
    <div>
        <h1 class="text-3xl font-bold text-slate-900">Trip Route Map</h1>
        <p class="text-sm text-slate-600 mt-1">Visualizing pickup and delivery routes</p>
    </div>
    <div class="mt-4 md:mt-0">
        <a href="{% url 'trip-list' %}" class="flex items-center space-x-2 px-4 py-2 border border-slate-300 rounded-md bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors shadow-sm">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Back to List</span>
        </a>
    </div>
</header>

<!-- Filter Form -->
<section class="bg-white border border-slate-200 rounded-lg p-5 mb-6 shadow-sm">
    <form method="get" class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
        <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Start Date</label>
            <input type="date" name="start_date" class="block w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-emerald-500 focus:border-emerald-500 bg-white" value="{{ start_date|date:'Y-m-d' }}">
        </div>
        <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">End Date</label>
            <input type="date" name="end_date" class="block w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-emerald-500 focus:border-emerald-500 bg-white" value="{{ end_date|date:'Y-m-d' }}">
        </div>
        <div>
            <button type="submit" class="w-full px-6 py-2 bg-emerald-600 text-white rounded-md font-medium hover:bg-emerald-700 shadow-sm transition-colors text-sm">
                <i class="fa-solid fa-filter mr-2"></i>Filter Map
            </button>
        </div>
    </form>
</section>

<!-- Map Container -->
<div class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm mb-8">
    <div id="map" class="h-[600px] w-full z-10"></div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Map (Centered on India)
        var map = L.map('map').setView([20.5937, 78.9629], 5);

        // Add OpenStreetMap Tile Layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Trip Data from Django View
        var trips = {{ trips_json|safe }};
        
        if (trips.length === 0) {
            return;
        }

        var bounds = L.latLngBounds();

        trips.forEach(function(trip) {
            // Draw Pickup Marker (Emerald)
            var pickupMarker = L.circleMarker(trip.start, {
                color: '#059669',
                fillColor: '#10b981',
                fillOpacity: 1,
                radius: 6
            }).addTo(map).bindPopup(`
                <div class="p-1">
                    <b class="text-emerald-700">Pickup:</b> ${trip.pickup_name}<br>
                    <b>Trip:</b> <a href="${trip.url}" class="text-blue-600 hover:underline">${trip.trip_number}</a><br>
                    <b>Date:</b> ${trip.date}
                </div>
            `);

            // Draw Delivery Marker (Red)
            var deliveryMarker = L.circleMarker(trip.end, {
                color: '#dc2626',
                fillColor: '#ef4444',
                fillOpacity: 1,
                radius: 6
            }).addTo(map).bindPopup(`
                <div class="p-1">
                    <b class="text-red-700">Delivery:</b> ${trip.delivery_name}<br>
                    <b>Trip:</b> <a href="${trip.url}" class="text-blue-600 hover:underline">${trip.trip_number}</a><br>
                    <b>Vehicle:</b> ${trip.vehicle}
                </div>
            `);

            // Draw Route Line (Slate)
            var routeLine = L.polyline([trip.start, trip.end], {
                color: '#64748b',
                weight: 2,
                opacity: 0.6,
                dashArray: '5, 10'
            }).addTo(map);

            // Add info to line
            routeLine.bindPopup(`
                <div class="p-1">
                    <b>${trip.trip_number}</b><br>
                    ${trip.pickup_name} <span class="text-slate-400 mx-1">➜</span> ${trip.delivery_name}<br>
                    <span class="text-xs text-slate-500">${trip.vehicle}</span>
                </div>
            `);

            bounds.extend(trip.start);
            bounds.extend(trip.end);
        });

        // Fit map to show all routes
        if (trips.length > 0) {
            map.fitBounds(bounds, {padding: [50, 50]});
        }
    });
</script>

<style>
    /* Custom popup styling to match Tailwind */
    .leaflet-popup-content-wrapper {
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        border: 1px solid #e2e8f0;
    }
    .leaflet-popup-content {
        margin: 12px;
        font-family: 'Inter', sans-serif;
    }
</style>
{% endblock %}
